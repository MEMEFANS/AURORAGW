<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURORA 极光后台管理</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: #f8fafc;
        font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
        background:
          radial-gradient(circle at 15% 8%, rgba(250, 204, 21, 0.2), transparent 28rem),
          radial-gradient(circle at 86% 4%, rgba(20, 184, 166, 0.12), transparent 24rem),
          linear-gradient(135deg, #070605, #17110a 48%, #080706);
      }
      button, input, textarea, select { font: inherit; }
      .shell { width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 64px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 18px 0 30px; position: sticky; top: 0; background: linear-gradient(to bottom, rgba(7,6,5,0.95), rgba(7,6,5,0.8)); z-index: 100; }
      
      /* Toast notification */
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(22,163,74,0.95);
        color: white;
        padding: 14px 24px;
        border-radius: 10px;
        font-weight: 700;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        z-index: 1000;
        transform: translateX(120%);
        transition: transform 0.3s ease;
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.error {
        background: rgba(239,68,68,0.95);
      }
      .toast.warning {
        background: rgba(245,158,11,0.95);
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .logo {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 10px;
        color: #111827;
        font-weight: 900;
        background: linear-gradient(105deg, #94620f, #f9e69a 32%, #d4a33a 58%, #fff2ad 78%, #9a620f);
        box-shadow: 0 0 30px rgba(250, 204, 21, 0.28);
      }
      h1, h2, h3, p { margin: 0; }
      .muted { color: #a8a29e; }
      .login, .panel, .card {
        border: 1px solid rgba(253, 230, 138, 0.12);
        border-radius: 10px;
        background: rgba(12, 10, 9, 0.64);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 236, 179, 0.08);
        backdrop-filter: blur(18px);
      }
      .login { display: grid; max-width: 520px; margin: 80px auto 0; gap: 16px; padding: 28px; }
      .panel { padding: 24px; }
      .stack, .list, .card { display: grid; gap: 14px; }
      .card { padding: 18px; }
      .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
      label { display: block; margin: 14px 0 8px; color: rgba(254, 243, 199, 0.88); font-size: 13px; font-weight: 800; }
      input, textarea, select {
        width: 100%;
        border: 1px solid rgba(253, 230, 138, 0.16);
        border-radius: 8px;
        outline: none;
        color: #f8fafc;
        background: rgba(0, 0, 0, 0.28);
        padding: 11px 12px;
      }
      input[type="file"] { color: #d6d3d1; }
      textarea { min-height: 110px; resize: vertical; }
      input:focus, textarea:focus, select:focus { border-color: rgba(252, 211, 77, 0.72); box-shadow: 0 0 0 3px rgba(252, 211, 77, 0.12); }
      .button-row { display: flex; flex-wrap: wrap; gap: 10px; }
      button { cursor: pointer; border: 0; border-radius: 8px; padding: 11px 16px; font-weight: 900; transition: all 0.2s; }
      button:hover { transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
      .gold { color: #111827; background: linear-gradient(105deg, #94620f, #f9e69a 32%, #d4a33a 58%, #fff2ad 78%, #9a620f); box-shadow: 0 14px 34px rgba(217, 119, 6, 0.24); }
      .gold.pulse {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 14px 34px rgba(217, 119, 6, 0.24); }
        50% { box-shadow: 0 14px 34px rgba(217, 119, 6, 0.6), 0 0 20px rgba(252, 211, 77, 0.4); }
      }
      .ghost { color: #fde68a; border: 1px solid rgba(253, 230, 138, 0.18); background: rgba(253, 230, 138, 0.08); }
      .danger { color: #fecaca; border: 1px solid rgba(248, 113, 113, 0.24); background: rgba(127, 29, 29, 0.32); }
      .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .status { min-height: 24px; margin-top: 12px; color: #86efac; font-size: 14px; font-weight: 600; text-align: right; }
      .hint { color: #a8a29e; font-size: 13px; line-height: 1.7; }
      .video-url { word-break: break-all; color: #fde68a; font-size: 13px; }
      .hidden { display: none; }
      
      /* 标签页样式 */
      .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
      .tab { 
        padding: 10px 20px; 
        border-radius: 8px; 
        cursor: pointer; 
        border: 1px solid rgba(253, 230, 138, 0.18);
        background: rgba(253, 230, 138, 0.08);
        color: #fde68a;
        font-weight: 700;
        transition: all 0.2s;
      }
      .tab:hover { background: rgba(253, 230, 138, 0.15); }
      .tab.active { 
        background: linear-gradient(105deg, #94620f, #f9e69a 32%, #d4a33a 58%, #fff2ad 78%, #9a620f);
        color: #111827;
        border-color: transparent;
      }
      .tab-content { display: none; }
      .tab-content.active { display: block; }
      
      /* 分割线 */
      .divider { height: 1px; background: rgba(253, 230, 138, 0.12); margin: 16px 0; }
      
      /* 文件上传区域 */
      .upload-area {
        display: grid;
        gap: 10px;
        padding: 16px;
        border: 2px dashed rgba(253, 230, 138, 0.3);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
        transition: all 0.3s;
      }
      .upload-area:hover {
        border-color: rgba(252, 211, 77, 0.6);
        background: rgba(0, 0, 0, 0.3);
      }
      .upload-area.dragover {
        border-color: rgba(252, 211, 77, 1);
        background: rgba(252, 211, 77, 0.1);
      }
      
      /* 上传进度条 */
      .progress-container {
        margin-top: 8px;
      }
      .progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #94620f, #f9e69a 32%, #d4a33a 58%, #fff2ad 78%, #9a620f);
        width: 0%;
        transition: width 0.3s ease;
        border-radius: 4px;
      }
      .progress-text {
        margin-top: 4px;
        font-size: 12px;
        color: #a8a29e;
      }
      
      /* 未保存提示 */
      .unsaved-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: rgba(245, 158, 11, 0.15);
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 8px;
        margin-bottom: 16px;
        animation: slideIn 0.3s ease;
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .unsaved-dot {
        width: 8px;
        height: 8px;
        background: #f59e0b;
        border-radius: 50%;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      
      /* 预览区域 */
      .preview-video {
        max-width: 100%;
        border-radius: 8px;
        margin-top: 8px;
      }
      
      @media (max-width: 900px) {
        .topbar, .two { grid-template-columns: 1fr; }
        .topbar { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast"></div>
    <main class="shell">
      <div class="topbar">
        <div class="brand">
          <div class="logo">A</div>
          <div>
            <h1>AURORA 极光后台管理</h1>
            <p class="muted">独立服务端后台，不打包进公开前台。</p>
          </div>
        </div>
        <div class="button-row hidden" id="actions">
          <button class="ghost" id="reloadBtn">重新加载</button>
          <button class="gold" id="saveBtn">保存到服务器</button>
        </div>
      </div>

      <!-- 未保存提示 -->
      <div class="unsaved-indicator hidden" id="unsavedIndicator">
        <div class="unsaved-dot"></div>
        <span>有未保存的更改，请点击「保存到服务器」</span>
      </div>

      <section class="login" id="login">
        <h2>管理员登录</h2>
        <p class="muted">请输入服务器配置的 ADMIN_TOKEN。</p>
        <input id="tokenInput" type="password" placeholder="后台密钥" />
        <button class="gold" id="loginBtn">进入后台</button>
        <div class="status" id="loginStatus"></div>
      </section>

      <section class="hidden" id="editor">
        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="home">首页内容</div>
          <div class="tab" data-tab="metrics">运营指标</div>
          <div class="tab" data-tab="resources">资料管理</div>
          <div class="tab" data-tab="videos">视频管理</div>
          <div class="tab" data-tab="notices">公告管理</div>
        </div>

        <div class="tab-content active" id="tab-home">
          <div class="panel">
            <h2>首页内容设置</h2>
            <div class="divider"></div>
            <label>主标题</label>
            <input id="heroTitle" />
            <label>高亮标题</label>
            <input id="heroHighlight" />
            <label>介绍文案</label>
            <textarea id="heroText"></textarea>
            <label>按钮文字</label>
            <input id="ctaText" />
            <label>顶部公告</label>
            <input id="announcement" />
          </div>
        </div>

        <div class="tab-content" id="tab-metrics">
          <div class="panel">
            <div class="section-head">
              <h2>运营指标</h2>
              <button class="ghost" data-add="metrics">新增指标</button>
            </div>
            <div class="list" id="metrics"></div>
          </div>
        </div>

        <div class="tab-content" id="tab-resources">
          <div class="panel">
            <div class="section-head">
              <h2>资料管理</h2>
              <button class="ghost" data-add="resources">新增资料</button>
            </div>
            <div class="list" id="resources"></div>
          </div>
        </div>

        <div class="tab-content" id="tab-videos">
          <div class="panel">
            <div class="section-head">
              <div>
                <h2>视频管理</h2>
                <p class="hint">支持上传 mp4、webm、mov、m4v。视频会自动转成网页兼容格式，完成后记得点击「保存到服务器」。</p>
              </div>
              <button class="ghost" data-add="videos">新增视频</button>
            </div>
            <div class="list" id="videos"></div>
          </div>
        </div>

        <div class="tab-content" id="tab-notices">
          <div class="panel">
            <div class="section-head">
              <h2>公告管理</h2>
              <button class="ghost" data-add="notices">新增公告</button>
            </div>
            <div class="list" id="notices"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const state = {
        token: localStorage.getItem("aurora-admin-token") || "",
        data: null,
        originalData: null,
        currentTab: "home",
        hasUnsavedChanges: false,
        isSaving: false
      };

      const $ = (id) => document.getElementById(id);

      const request = async (path, options = {}) => {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${state.token}`,
            ...(options.headers || {}),
          },
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.message || "请求失败");
        return payload;
      };

      const uploadFile = async (file, progressCallback) => {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.timeout = 1000 * 60 * 60;
          
          xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable && progressCallback) {
              const percentComplete = (e.loaded / e.total) * 100;
              progressCallback(percentComplete);
            }
          });
          
          xhr.addEventListener('load', () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              try {
                const payload = JSON.parse(xhr.responseText);
                resolve(payload);
              } catch (e) {
                reject(new Error('服务器返回无效响应'));
              }
            } else {
              try {
                const payload = JSON.parse(xhr.responseText);
                reject(new Error(payload.message || '上传失败'));
              } catch (e) {
                reject(new Error('上传失败'));
              }
            }
          });
          
          xhr.addEventListener('error', () => reject(new Error('上传连接中断。请检查网络，或先把视频压缩到 100MB 以内再上传。')));
          xhr.addEventListener('timeout', () => reject(new Error('上传或转码超时。请压缩视频，或先转为 H.264/AAC MP4 后再上传。')));
          xhr.addEventListener('abort', () => reject(new Error('上传已取消')));
          
          xhr.open('POST', `/api/admin/upload?filename=${encodeURIComponent(file.name)}`);
          xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
          xhr.setRequestHeader('Authorization', `Bearer ${state.token}`);
          xhr.send(file);
        });
      };

      // 标记有未保存更改
      const markUnsaved = () => {
        if (state.isSaving) return;
        state.hasUnsavedChanges = true;
        $("unsavedIndicator").classList.remove("hidden");
        $("saveBtn").classList.add("pulse");
      };

      // 清除未保存标记
      const clearUnsaved = () => {
        state.hasUnsavedChanges = false;
        $("unsavedIndicator").classList.add("hidden");
        $("saveBtn").classList.remove("pulse");
      };

      const bindField = (id, key) => {
        const input = $(id);
        input.value = state.data[key] || "";
        input.oninput = () => {
          state.data[key] = input.value;
          markUnsaved();
        };
      };

      const createInput = (value, oninput, placeholder = "") => {
        const input = document.createElement("input");
        input.value = value || "";
        input.placeholder = placeholder;
        input.oninput = () => {
          oninput(input.value);
          markUnsaved();
        };
        return input;
      };

      // Toast notification
      let toastTimer = null;
      const showToast = (message, type = "success") => {
        const toast = $("toast");
        toast.textContent = message;
        toast.classList.remove("error", "warning", "show");
        if (type === "error") toast.classList.add("error");
        if (type === "warning") toast.classList.add("warning");
        
        void toast.offsetWidth; // Trigger reflow
        toast.classList.add("show");
        
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 5000);
      };

      const render = () => {
        bindField("heroTitle", "heroTitle");
        bindField("heroHighlight", "heroHighlight");
        bindField("heroText", "heroText");
        bindField("ctaText", "ctaText");
        bindField("announcement", "announcement");
        renderMetrics();
        renderResources();
        renderVideos();
        renderNotices();
      };

      const renderMetrics = () => {
        const root = $("metrics");
        root.innerHTML = "";
        state.data.metrics.forEach((metric, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.append(
            createInput(metric.label, (value) => (metric.label = value), "指标名称"),
            createInput(metric.value, (value) => (metric.value = value), "指标数值"),
            createInput(metric.trend, (value) => (metric.trend = value), "变化趋势"),
            removeButton("metrics", index)
          );
          root.append(card);
        });
      };

      const renderResources = () => {
        const root = $("resources");
        root.innerHTML = "";
        state.data.resources.forEach((resource, index) => {
          const card = document.createElement("div");
          card.className = "card";
          const row = document.createElement("div");
          row.className = "two";
          row.append(
            createInput(resource.type, (value) => (resource.type = value), "类型"),
            createInput(resource.size, (value) => (resource.size = value), "大小"),
          );

          const urlInput = createInput(resource.url || "", (value) => (resource.url = value), "资料链接 / 上传后自动生成");
          const fileInput = document.createElement("input");
          fileInput.type = "file";
          fileInput.accept = ".pdf,.doc,.docx,.ppt,.pptx,.txt";

          // 进度条容器
          const progressContainer = document.createElement("div");
          progressContainer.className = "progress-container hidden";
          const progressBar = document.createElement("div");
          progressBar.className = "progress-bar";
          const progressFill = document.createElement("div");
          progressFill.className = "progress-fill";
          const progressText = document.createElement("div");
          progressText.className = "progress-text";
          progressBar.appendChild(progressFill);
          progressContainer.appendChild(progressBar);
          progressContainer.appendChild(progressText);

          const uploadBtn = document.createElement("button");
          uploadBtn.className = "ghost";
          uploadBtn.textContent = "上传文件";
          uploadBtn.onclick = async () => {
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
              showToast("请先选择一个文件。", "error");
              return;
            }
            
            // 显示进度条
            progressContainer.classList.remove("hidden");
            uploadBtn.disabled = true;
            uploadBtn.textContent = "上传中...";
            
            showToast(`正在上传：${file.name}`);
            try {
              const uploadResult = await uploadFile(file, (percent) => {
                progressFill.style.width = `${percent}%`;
                progressText.textContent = `${Math.round(percent)}%`;
              });
              resource.url = uploadResult.url;
              urlInput.value = resource.url;
              markUnsaved();
              showToast(uploadResult.message || uploadResult.warning || "文件已上传，请点击「保存到服务器」。", "warning");
            } catch (error) {
              showToast(error.message, "error");
            } finally {
              progressContainer.classList.add("hidden");
              progressFill.style.width = "0%";
              uploadBtn.disabled = false;
              uploadBtn.textContent = "上传文件";
            }
          };

          // 拖拽上传
          const uploadArea = document.createElement("div");
          uploadArea.className = "upload-area";
          
          uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("dragover");
          });
          
          uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("dragover");
          });
          
          uploadArea.addEventListener("drop", async (e) => {
            e.preventDefault();
            uploadArea.classList.remove("dragover");
            
            const file = e.dataTransfer.files && e.dataTransfer.files[0];
            if (!file) return;
            
            // 显示进度条
            progressContainer.classList.remove("hidden");
            uploadBtn.disabled = true;
            uploadBtn.textContent = "上传中...";
            
            showToast(`正在上传：${file.name}`);
            try {
              const uploadResult = await uploadFile(file, (percent) => {
                progressFill.style.width = `${percent}%`;
                progressText.textContent = `${Math.round(percent)}%`;
              });
              resource.url = uploadResult.url;
              urlInput.value = resource.url;
              markUnsaved();
              showToast(uploadResult.message || uploadResult.warning || "文件已上传，请点击「保存到服务器」。", "warning");
            } catch (error) {
              showToast(error.message, "error");
            } finally {
              progressContainer.classList.add("hidden");
              progressFill.style.width = "0%";
              uploadBtn.disabled = false;
              uploadBtn.textContent = "上传文件";
            }
          });

          const currentUrl = document.createElement("div");
          currentUrl.className = "video-url";
          currentUrl.textContent = resource.url ? `当前文件：${resource.url}` : "当前未上传文件";

          uploadArea.append(fileInput, uploadBtn, progressContainer, currentUrl);

          card.append(
            createInput(resource.title, (value) => (resource.title = value), "资料标题"),
            row,
            urlInput,
            uploadArea,
            removeButton("resources", index),
          );
          root.append(card);
        });
      };

      const renderVideos = () => {
        const root = $("videos");
        root.innerHTML = "";
        state.data.videos.forEach((video, index) => {
          const card = document.createElement("div");
          card.className = "card";

          const metaRow = document.createElement("div");
          metaRow.className = "two";
          metaRow.append(
            createInput(video.author, (value) => (video.author = value), "作者/来源"),
            createInput(video.views, (value) => (video.views = value), "播放量"),
          );

          const urlInput = createInput(video.url, (value) => (video.url = value), "视频链接（建议使用上传后的 /uploads/... 地址）");
          
          const fileInput = document.createElement("input");
          fileInput.type = "file";
          fileInput.accept = "video/mp4,video/webm,video/quicktime,video/x-m4v";

          // 进度条容器
          const progressContainer = document.createElement("div");
          progressContainer.className = "progress-container hidden";
          const progressBar = document.createElement("div");
          progressBar.className = "progress-bar";
          const progressFill = document.createElement("div");
          progressFill.className = "progress-fill";
          const progressText = document.createElement("div");
          progressText.className = "progress-text";
          progressBar.appendChild(progressFill);
          progressContainer.appendChild(progressBar);
          progressContainer.appendChild(progressText);

          // 视频预览
          const previewContainer = document.createElement("div");
          previewContainer.className = "preview-container hidden";
          
          const updatePreview = () => {
            if (video.url && !video.url.startsWith("/uploads/")) {
              previewContainer.innerHTML = "";
              previewContainer.classList.add("hidden");
              return;
            }
            
            if (video.url) {
              previewContainer.innerHTML = `
                <video class="preview-video" controls>
                  <source src="${video.url}" type="video/mp4">
                  您的浏览器不支持视频播放
                </video>
              `;
              previewContainer.classList.remove("hidden");
            } else {
              previewContainer.innerHTML = "";
              previewContainer.classList.add("hidden");
            }
          };
          
          updatePreview();

          const uploadBtn = document.createElement("button");
          uploadBtn.className = "ghost";
          uploadBtn.textContent = "上传视频";
          uploadBtn.onclick = async () => {
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
              showToast("请先选择一个视频文件。", "error");
              return;
            }
            
            // 显示进度条
            progressContainer.classList.remove("hidden");
            uploadBtn.disabled = true;
            uploadBtn.textContent = "上传中...";
            
            showToast(`正在上传：${file.name}`);
            try {
              const uploadResult = await uploadFile(file, (percent) => {
                progressFill.style.width = `${percent}%`;
                progressText.textContent = `${Math.round(percent)}%`;
              });
              video.url = uploadResult.url;
              urlInput.value = video.url;
              markUnsaved();
              updatePreview();
              showToast(uploadResult.message || uploadResult.warning || "视频已上传，请点击「保存到服务器」。", "warning");
            } catch (error) {
              showToast(error.message, "error");
            } finally {
              progressContainer.classList.add("hidden");
              progressFill.style.width = "0%";
              uploadBtn.disabled = false;
              uploadBtn.textContent = "上传视频";
            }
          };

          // 拖拽上传
          const uploadArea = document.createElement("div");
          uploadArea.className = "upload-area";
          
          uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("dragover");
          });
          
          uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("dragover");
          });
          
          uploadArea.addEventListener("drop", async (e) => {
            e.preventDefault();
            uploadArea.classList.remove("dragover");
            
            const file = e.dataTransfer.files && e.dataTransfer.files[0];
            if (!file) return;
            
            // 显示进度条
            progressContainer.classList.remove("hidden");
            uploadBtn.disabled = true;
            uploadBtn.textContent = "上传中...";
            
            showToast(`正在上传：${file.name}`);
            try {
              const uploadResult = await uploadFile(file, (percent) => {
                progressFill.style.width = `${percent}%`;
                progressText.textContent = `${Math.round(percent)}%`;
              });
              video.url = uploadResult.url;
              urlInput.value = video.url;
              markUnsaved();
              updatePreview();
              showToast(uploadResult.message || uploadResult.warning || "视频已上传，请点击「保存到服务器」。", "warning");
            } catch (error) {
              showToast(error.message, "error");
            } finally {
              progressContainer.classList.add("hidden");
              progressFill.style.width = "0%";
              uploadBtn.disabled = false;
              uploadBtn.textContent = "上传视频";
            }
          });

          const currentUrl = document.createElement("div");
          currentUrl.className = "video-url";
          currentUrl.textContent = video.url ? `当前视频：${video.url}` : "当前未设置视频";

          uploadArea.append(fileInput, uploadBtn, progressContainer, currentUrl, previewContainer);

          const hint = document.createElement("div");
          hint.style.cssText = "color: #78716c; font-size: 12px; margin-top: 8px;";
          hint.textContent = "提示：国内用户建议上传本地视频文件。YouTube 等海外链接会作为外部视频打开，可能需要网络代理。";

          card.append(
            createInput(video.title, (value) => (video.title = value), "视频标题"),
            metaRow,
            urlInput,
            uploadArea,
            hint,
            removeButton("videos", index),
          );
          root.append(card);
        });
      };

      const renderNotices = () => {
        const root = $("notices");
        root.innerHTML = "";
        state.data.notices.forEach((notice, index) => {
          const card = document.createElement("div");
          card.className = "card";
          const content = document.createElement("textarea");
          content.value = notice.content || "";
          content.placeholder = "公告内容";
          content.oninput = () => {
            notice.content = content.value;
            markUnsaved();
          };
          const select = document.createElement("select");
          select.innerHTML = "<option>已发布</option><option>草稿</option>";
          select.value = notice.status || "草稿";
          select.onchange = () => {
            notice.status = select.value;
            markUnsaved();
          };
          card.append(
            createInput(notice.title, (value) => (notice.title = value), "公告标题"), 
            content, 
            select, 
            removeButton("notices", index)
          );
          root.append(card);
        });
      };

      const removeButton = (key, index) => {
        const button = document.createElement("button");
        button.className = "danger";
        button.textContent = "删除";
        button.onclick = () => {
          state.data[key].splice(index, 1);
          markUnsaved();
          render();
        };
        return button;
      };

      const loadData = async () => {
        showToast("正在加载服务器数据...");
        state.data = await request("/api/admin/site");
        state.data.videos = (state.data.videos || []).map((video) => ({ url: "", ...video }));
        state.originalData = JSON.stringify(state.data);
        clearUnsaved();
        $("login").classList.add("hidden");
        $("editor").classList.remove("hidden");
        $("actions").classList.remove("hidden");
        render();
        showToast("数据已加载");
      };

      $("loginBtn").onclick = async () => {
        state.token = $("tokenInput").value.trim();
        localStorage.setItem("aurora-admin-token", state.token);
        try {
          await loadData();
          $("loginStatus").textContent = "";
        } catch (error) {
          $("loginStatus").textContent = error.message;
        }
      };

      $("reloadBtn").onclick = () => {
        if (state.hasUnsavedChanges) {
          if (!confirm("有未保存的更改，确定要重新加载吗？")) {
            return;
          }
        }
        loadData().catch((error) => showToast(error.message, "error"));
      };

      $("saveBtn").onclick = async () => {
        if (state.isSaving) return;
        state.isSaving = true;
        $("saveBtn").disabled = true;
        showToast("正在保存...");
        try {
          const payload = await request("/api/admin/site", {
            method: "POST",
            body: JSON.stringify(state.data),
          });
          state.data = payload.data || state.data;
          state.originalData = JSON.stringify(state.data);
          clearUnsaved();
          showToast(`已保存 ${new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`);
        } catch (error) {
          showToast(error.message, "error");
        } finally {
          state.isSaving = false;
          $("saveBtn").disabled = false;
        }
      };

      document.querySelectorAll("[data-add]").forEach((button) => {
        button.onclick = () => {
          const key = button.dataset.add;
          const templates = {
            metrics: { label: "新指标", value: "0", trend: "+0%" },
            resources: { title: "新资料标题", type: "PDF", size: "1.0 MB", url: "" },
            videos: { title: "新视频标题", author: "Aurora Team", views: "0", url: "" },
            notices: { title: "新公告", content: "填写公告内容", status: "草稿" },
          };
          state.data[key].push({ ...templates[key] });
          markUnsaved();
          render();
        };
      });

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.onclick = () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
          tab.classList.add("active");
          $(`tab-${tab.dataset.tab}`).classList.add("active");
          state.currentTab = tab.dataset.tab;
        };
      });

      if (state.token) {
        $("tokenInput").value = state.token;
      }

      // 页面离开前提醒
      window.addEventListener("beforeunload", (e) => {
        if (state.hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = "";
          return "";
        }
      });
    </script>
  </body>
</html>
